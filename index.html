<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <main>
        <h1 id="title">Completing Your Purcheses</h1>
        <p id="description"><b>Complete</b> your purcheses and wait <strong>until</strong> we build it!</p>
        <form id="survey-form">
            <fieldset>
                <legend id="Personal-Info-legend">Personal Info</legend>
                <label for="name" id="name-label">Enter your name(required):</label>
                <input required type="text" id="name" value="name" placeholder="mr.dewit">
                <label for="email" id="email-label">Enter your email(required):</label>
                <input required type="email" id="email" placeholder="Fake@example.com" minlength="6" maxlength="100"
                    size="25" value="email">
                <label for="number" id="number-label">Enter your number(required):</label>
                <input required type="number" id="number" placeholder="9123456789" minlength="10" maxlength="10" size="25"
                    value="number">
            </fieldset>
            <fieldset>
                <legend id="Purchese-Info-legend">Purchese Info</legend>
                <label for="site-length">How long your site should be(required)?</label>
                <select required id="dropdown" name="site-length">
                    <option value="short">1 page</option>
                    <option selected value="medium">2-3 page</option>
                    <option value="long">4-10 page</option>
                    <option value="huge">+10 page</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Do you want a wordpress site or one codded from scratch(required)?</legend>
                <input type="radio" id="wordpress-option" value="wordpress" name="codded-wordpress" required>
                <label for="wordpress-option">wordpress</label>
                <input type="radio" id="codded-option" value="codded" name="codded-wordpress" required>
                <label for="codded-option">codded</label>
            </fieldset>
            <fieldset>
                <legend>How did you found us(optional)?</legend>
                <input type="checkbox" id="friends" name="choice" value="friends">
                <label for="friends">From friends</label>
                <input type="checkbox" id="instagram" name="choice" value="instagram">
                <label for="instagram">Instagram</label>
                <input type="checkbox" id="youtube" name="choice" value="youtube">
                <label for="youtube">Youtube</label>
                <input type="checkbox" id="SEO" name="choice" value="SEO">
                <label for="Seo"><abbr title="Search Engine Optimization">SEO</abbr></label>
            </fieldset>

            <label>Also remember to write Down your comments</label>
            <textarea cols="38" rows="15" name="comments" value="comment" id="comments"
                placeholder="W dudes keep the quality at peak"></textarea>

            <button type="submit" id="submit">Submit</button>
        </form>
    </main>
</body>

</html>
